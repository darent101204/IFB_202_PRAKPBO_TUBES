# Smart Waste Pickup Scheduling System - Application Configuration

# ============================================================
# DATASOURCE (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_waste?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ============================================================
# SERVER
# ============================================================
server.port=8080
spring.application.name=smart-waste-system

# ============================================================
# SESSION
# ============================================================
server.servlet.session.timeout=30m

# ============================================================
# LOGGING
# ============================================================
logging.level.com.example.project=DEBUG
logging.level.org.hibernate.SQL=DEBUG
