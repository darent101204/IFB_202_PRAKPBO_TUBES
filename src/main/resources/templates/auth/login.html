<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Waste System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --primary-color: #2f7d4a;
        --primary-dark: #143f2a;
        --primary-light: #58b779;
        --border-color: #dfe7e2;
        --text-color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background:
          radial-gradient(
            circle at 20% 15%,
            rgba(88, 183, 121, 0.28),
            transparent 18rem
          ),
          linear-gradient(135deg, #143f2a 0%, #0f7a8a 100%);
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-color);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .login-card {
        background: white;
        padding: 34px;
        border-radius: 8px;
        box-shadow: 0 24px 60px rgba(15, 47, 37, 0.32);
        width: 100%;
        max-width: 430px;
        border: 1px solid rgba(255, 255, 255, 0.55);
      }

      .login-header {
        text-align: center;
        margin-bottom: 28px;
      }

      .login-header i {
        font-size: 3rem;
        color: var(--primary-color);
      }

      .login-header h2 {
        font-weight: 800;
        color: var(--primary-dark);
      }

      .form-label {
        font-weight: 700;
        color: #344054;
      }

      .form-control,
      .input-group-text {
        border-color: var(--border-color);
        border-radius: 8px;
        min-height: 46px;
      }

      .form-control:focus {
        border-color: var(--primary-light);
        box-shadow: 0 0 0 0.2rem rgba(47, 125, 74, 0.16);
      }

      .btn-success {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        border-radius: 8px;
        min-height: 46px;
        font-weight: 800;
      }

      .btn-success:hover,
      .btn-success:focus {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }

      .alert {
        border: none;
        border-radius: 8px;
      }

      @media (max-width: 575.98px) {
        body {
          padding: 16px;
        }

        .login-card {
          padding: 26px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <i class="bi bi-recycle"></i>
        <h2 class="mt-2">Smart Waste</h2>
        <p class="text-muted">Scheduling System</p>
      </div>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div
        th:if="${success}"
        class="alert alert-success"
        th:text="${success}"
      ></div>
      <div th:if="${param.logout}" class="alert alert-info">
        Anda telah logout.
      </div>

      <form th:action="@{/login}" th:object="${loginDTO}" method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              class="form-control"
              th:field="*{email}"
              placeholder="admin@mail.com"
              required
            />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              class="form-control"
              th:field="*{password}"
              placeholder="admin123"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100 mb-3">
          <i class="bi bi-box-arrow-in-right"></i>
          Login
        </button>

        <div class="text-center mb-3">
          <span class="text-muted small">Belum punya akun?</span>
          <a
            th:href="@{/register}"
            class="small fw-bold text-success text-decoration-none"
            >Daftar</a
          >
        </div>

        <div class="text-center text-muted">
          <small></small>
        </div>
      </form>
    </div>
  </body>
</html>
