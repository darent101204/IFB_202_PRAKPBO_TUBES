<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Waste System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body class="auth-bg">
    <div class="auth-card login-card">
      <div class="auth-header">
        <div class="auth-icon"><i class="bi bi-recycle"></i></div>
        <h2>Smart Waste</h2>
        <p>Scheduling System</p>
      </div>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div
        th:if="${success}"
        class="alert alert-success"
        th:text="${success}"
      ></div>
      <div th:if="${param.logout}" class="alert alert-info">
        Anda telah logout.
      </div>

      <form th:action="@{/login}" th:object="${loginDTO}" method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              class="form-control"
              th:field="*{email}"
              placeholder="admin@mail.com"
              required
            />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              class="form-control"
              th:field="*{password}"
              placeholder="admin123"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100 mb-3">
          <i class="bi bi-box-arrow-in-right"></i>
          Login
        </button>

        <div class="text-center mb-3">
          <span class="text-muted small">Belum punya akun?</span>
          <a
            th:href="@{/register}"
            class="small fw-bold text-success text-decoration-none"
            >Daftar</a
          >
        </div>

        <div class="text-center text-muted">
          <small></small>
        </div>
      </form>
    </div>
  </body>
</html>
