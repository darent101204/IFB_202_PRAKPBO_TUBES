<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Resident - Smart Waste System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-bg">
    <div class="auth-card register-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="bi bi-recycle"></i></div>
            <h2>Smart Waste</h2>
            <p>Resident Registration</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registrationDTO}" method="post">
            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Budi Santoso" required>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="budi@mail.com" required>
                </div>
            </div>

            <div class="row">
                <!-- Password -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" th:field="*{password}" placeholder="Min 6 karakter" required>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Konfirmasi Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Min 6 karakter" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <!-- Region -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Region</label>
                    <select id="regionSelect" class="form-select" th:field="*{regionId}" required>
                        <option value="" selected>Pilih Region...</option>
                        <option th:each="reg : ${regions}" th:value="${reg.id}" th:text="${reg.name}"></option>
                    </select>
                </div>

                <!-- RT -->
                <div class="col-md-6 mb-4">
                    <label class="form-label">RT</label>
                    <select id="rtSelect" class="form-select" th:field="*{rtId}" required>
                        <option value="" selected>Pilih RT...</option>
                        <option th:each="rt : ${rts}" 
                                th:value="${rt.id}" 
                                th:text="${rt.name}" 
                                th:data-region-id="${rt.region != null ? rt.region.id : ''}">
                        </option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 mb-3">
                <i class="bi bi-person-plus"></i>
                Daftar
            </button>
            
            <div class="text-center mb-3">
                <span class="text-muted small">Sudah punya akun?</span>
                <a th:href="@{/login}" class="small fw-bold text-success text-decoration-none">Login</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const regionSelect = document.getElementById("regionSelect");
            const rtSelect = document.getElementById("rtSelect");
            const rtOptions = Array.from(rtSelect.options).slice(1); // Keep placeholder option

            regionSelect.addEventListener("change", function() {
                const selectedRegionId = regionSelect.value;
                
                // Clear selection
                rtSelect.value = "";
                
                // Clear dropdown except placeholder
                rtSelect.innerHTML = '<option value="" selected>Pilih RT...</option>';
                
                // Filter and append
                const filteredOptions = rtOptions.filter(opt => opt.getAttribute("data-region-id") === selectedRegionId);
                filteredOptions.forEach(opt => rtSelect.appendChild(opt));
            });
        });
    </script>
</body>
</html>
