<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Resident - Smart Waste System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #2f7d4a;
            --primary-dark: #143f2a;
            --primary-light: #58b779;
            --border-color: #dfe7e2;
            --text-color: #1f2933;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at 20% 15%, rgba(88, 183, 121, 0.28), transparent 18rem),
                linear-gradient(135deg, #143f2a 0%, #0f7a8a 100%);
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .register-card {
            background: white;
            padding: 34px;
            border-radius: 8px;
            box-shadow: 0 24px 60px rgba(15, 47, 37, 0.32);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.55);
        }

        .register-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .register-header i {
            font-size: 3rem;
            color: var(--primary-color);
        }

        .register-header h2 {
            font-weight: 800;
            color: var(--primary-dark);
        }

        .form-label {
            font-weight: 700;
            color: #344054;
        }

        .form-control,
        .form-select,
        .input-group-text {
            border-color: var(--border-color);
            border-radius: 8px;
            min-height: 46px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 0.2rem rgba(47, 125, 74, 0.16);
        }

        .btn-success {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 8px;
            min-height: 46px;
            font-weight: 800;
        }

        .btn-success:hover,
        .btn-success:focus {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .alert {
            border: none;
            border-radius: 8px;
        }

        @media (max-width: 575.98px) {
            body {
                padding: 16px;
            }

            .register-card {
                padding: 26px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <i class="bi bi-recycle"></i>
            <h2 class="mt-2">Smart Waste</h2>
            <p class="text-muted">Resident Registration</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registrationDTO}" method="post">
            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Budi Santoso" required>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="budi@mail.com" required>
                </div>
            </div>

            <div class="row">
                <!-- Password -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" th:field="*{password}" placeholder="Min 6 karakter" required>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Konfirmasi Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Min 6 karakter" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <!-- Region -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Region</label>
                    <select id="regionSelect" class="form-select" th:field="*{regionId}" required>
                        <option value="" selected>Pilih Region...</option>
                        <option th:each="reg : ${regions}" th:value="${reg.id}" th:text="${reg.name}"></option>
                    </select>
                </div>

                <!-- RT -->
                <div class="col-md-6 mb-4">
                    <label class="form-label">RT</label>
                    <select id="rtSelect" class="form-select" th:field="*{rtId}" required>
                        <option value="" selected>Pilih RT...</option>
                        <option th:each="rt : ${rts}" 
                                th:value="${rt.id}" 
                                th:text="${rt.name}" 
                                th:data-region-id="${rt.region != null ? rt.region.id : ''}">
                        </option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 mb-3">
                <i class="bi bi-person-plus"></i>
                Daftar
            </button>
            
            <div class="text-center mb-3">
                <span class="text-muted small">Sudah punya akun?</span>
                <a th:href="@{/login}" class="small fw-bold text-success text-decoration-none">Login</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const regionSelect = document.getElementById("regionSelect");
            const rtSelect = document.getElementById("rtSelect");
            const rtOptions = Array.from(rtSelect.options).slice(1); // Keep placeholder option

            regionSelect.addEventListener("change", function() {
                const selectedRegionId = regionSelect.value;
                
                // Clear selection
                rtSelect.value = "";
                
                // Clear dropdown except placeholder
                rtSelect.innerHTML = '<option value="" selected>Pilih RT...</option>';
                
                // Filter and append
                const filteredOptions = rtOptions.filter(opt => opt.getAttribute("data-region-id") === selectedRegionId);
                filteredOptions.forEach(opt => rtSelect.appendChild(opt));
            });
        });
    </script>
</body>
</html>
