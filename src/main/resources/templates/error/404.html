<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<head>
    <title>Data Tidak Ditemukan</title>
</head>
<body>
    <div layout:fragment="page-title" th:text="${errorTitle}">Data Tidak Ditemukan</div>

    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-body text-center py-5">
                        <i class="bi bi-search fs-1 text-muted"></i>
                        <h2 class="h4 mt-3" th:text="${errorTitle}">Data Tidak Ditemukan</h2>
                        <p class="text-muted" th:text="${errorMessage}">Data yang diminta tidak tersedia.</p>
                        <a th:href="@{/dashboard}" class="btn btn-primary">
                            <i class="bi bi-arrow-left"></i>
                            Kembali ke Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
