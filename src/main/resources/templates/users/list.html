<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Kelola User</title>
</head>
<body>
    <div layout:fragment="page-title">Manajemen User</div>

    <div layout:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <span>Daftar User Sistem</span>
                <a th:href="@{/users/create}" class="btn btn-sm btn-primary">Tambah User</a>
            </div>
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Wilayah</th>
                            <th>RT</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.name}"></td>
                            <td th:text="${u.email}"></td>
                            <td><span class="badge bg-secondary" th:text="${u.role}"></span></td>
                            <td th:text="${u.region != null ? u.region.name : '-'}"></td>
                            <td th:text="${u.rt != null ? u.rt.name : '-'}"></td>
                            <td>
                                <span th:if="${u.isActive}" class="text-success"><i class="bi bi-check-circle"></i> Aktif</span>
                                <span th:unless="${u.isActive}" class="text-danger"><i class="bi bi-x-circle"></i> Nonaktif</span>
                            </td>
                            <td>
                                <a th:href="@{/users/{id}/edit(id=${u.id})}" 
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            
                                <form th:action="@{/users/{id}/delete(id=${u.id})}"
                                      method="post"
                                      style="display:inline"
                                      onsubmit="return confirm('Hapus user ini?')">
                            
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                            
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
