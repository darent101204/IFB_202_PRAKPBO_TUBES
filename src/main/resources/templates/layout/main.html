<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <script th:src="@{/js/theme-toggle.js}"></script>
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <i class="bi bi-recycle"></i> SMART WASTE
            </div>
            <ul class="list-unstyled components">
                <li th:classappend="${currentUri == '/dashboard' ? 'active' : ''}">
                    <a th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                </li>
                
                <!-- Resident Menu -->
                <li th:if="${session.userRole == 'RESIDENT'}" th:classappend="${currentUri == '/requests/create' ? 'active' : ''}">
                    <a th:href="@{/requests/create}"><i class="bi bi-plus-circle"></i> Buat Request</a>
                </li>

                <!-- Admin Menus -->
                <li th:if="${session.userRole == 'ADMIN'}" th:classappend="${currentUri != null and currentUri.startsWith('/users') ? 'active' : ''}">
                    <a th:href="@{/users}"><i class="bi bi-people"></i> Kelola User</a>
                </li>
                <li th:if="${session.userRole == 'ADMIN'}" th:classappend="${currentUri != null and currentUri.startsWith('/admin/regions') ? 'active' : ''}">
                    <a th:href="@{/admin/regions}"><i class="bi bi-geo-alt"></i> Kelola Region</a>
                </li>
                <li th:if="${session.userRole == 'ADMIN'}" th:classappend="${currentUri != null and currentUri.startsWith('/admin/rts') ? 'active' : ''}">
                    <a th:href="@{/admin/rts}"><i class="bi bi-building"></i> Kelola RT</a>
                </li>
                <li th:if="${session.userRole == 'ADMIN'}" th:classappend="${currentUri != null and currentUri.startsWith('/admin/waste-categories') ? 'active' : ''}">
                    <a th:href="@{/admin/waste-categories}"><i class="bi bi-tags"></i> Kategori Limbah</a>
                </li>

                <li>
                    <a th:href="@{/logout}" class="text-danger"><i class="bi bi-box-arrow-left"></i> Logout</a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container-fluid">
                    <button class="btn btn-outline-secondary sidebar-toggle d-lg-none me-2" type="button" aria-label="Toggle navigation">
                        <i class="bi bi-list"></i>
                    </button>
                    <span class="navbar-brand mb-0 h1" layout:fragment="page-title">Dashboard</span>
                    <div class="ms-auto d-flex align-items-center gap-3">
                        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                            <i class="bi bi-moon"></i>
                        </button>
                        <span class="user-chip d-inline-flex align-items-center gap-2">
                            <i class="bi bi-person-circle"></i> 
                            <span class="user-name" th:text="${session.loggedInUser != null ? session.loggedInUser.name : 'User'}">User</span>
                            <span class="role-brackets">(</span><small th:text="${session.userRole}"></small><span class="role-brackets">)</span>
                        </span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div layout:fragment="content">
                    <!-- Page content goes here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var sidebarToggle = document.querySelector(".sidebar-toggle");
        if (sidebarToggle) {
            sidebarToggle.addEventListener("click", function () {
                document.body.classList.toggle("sidebar-open");
            });
        }

        document.querySelectorAll("#sidebar a").forEach(function (link) {
            link.addEventListener("click", function () {
                document.body.classList.remove("sidebar-open");
            });
        });
    </script>
</body>
</html>
