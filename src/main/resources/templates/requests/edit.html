<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Edit Request Penjemputan</title>
</head>
<body>
    <div layout:fragment="page-title">Edit Request Penjemputan</div>

    <div layout:fragment="content" class="slide-up">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/requests/{id}/edit(id=${request.id})}" th:object="${requestDTO}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" th:field="*{rtId}" />

                            <div class="mb-3">
                                <label class="form-label">RT Tujuan</label>
                                <input type="text" class="form-control" th:value="${request.rt != null ? request.rt.name : '-'}" readonly>
                            </div>

                            <div class="card mb-3">
                                <div class="card-header">
                                    <strong><i class="bi bi-recycle"></i> Kategori Limbah</strong>
                                </div>
                                <div class="card-body">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Kategori Sampah <span class="text-danger">*</span></label>
                                            <select class="form-select" th:field="*{items[0].categoryId}" required>
                                                <option value="">-- Pilih Kategori --</option>
                                                <option th:each="cat : ${categories}"
                                                        th:value="${cat.id}"
                                                        th:text="${cat.name + (cat.unit != null ? ' (' + cat.unit + ')' : '')}">
                                                </option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Jumlah <span class="text-danger">*</span></label>
                                            <input type="number" class="form-control"
                                                   th:field="*{items[0].quantity}"
                                                   min="0.1" step="any"
                                                   placeholder="Contoh: 2.5"
                                                   required>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Catatan / Keterangan Limbah (Opsional)</label>
                                <textarea class="form-control" th:field="*{notes}" rows="3" 
                                          placeholder="Keterangan tambahan jika ada..."></textarea>
                            </div>

                            <!-- Foto Saat Ini -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Foto Saat Ini</label>
                                <div class="mb-2">
                                    <span th:if="${request.photoPath != null}">
                                        <a target="_blank" th:href="@{'/uploads/' + ${request.photoPath}}">
                                            <img th:src="@{'/uploads/' + ${request.photoPath}}" class="img-fluid rounded border" style="max-height: 150px; object-fit: contain;">
                                        </a>
                                    </span>
                                    <span th:if="${request.photoPath == null}" class="text-muted d-block">Tidak ada foto</span>
                                </div>
                                <label class="form-label fw-bold mt-2">Ganti Foto (Opsional)</label>
                                <input type="file" class="form-control" th:field="*{photo}" accept="image/*">
                            </div>

                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Rencana Tanggal Penjemputan (Opsional)</label>
                                <input type="date" class="form-control" th:field="*{scheduledDate}">
                            </div>

                            <div class="alert alert-info">
                                <i class="bi bi-info-circle"></i> Mengubah request ini akan mengirimkan kembali request ke RT untuk disetujui.
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{/dashboard}" class="btn btn-secondary">Batal</a>
                                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
