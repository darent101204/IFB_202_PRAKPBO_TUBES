<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Edit Kategori Sampah</title>
</head>

<body>

<div layout:fragment="page-title">
    Edit Kategori Sampah
</div>

<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card">
                <div class="card-body">

                    <form th:action="@{/admin/waste-categories/{id}/edit(id=${categoryDTO.id})}"
                          th:object="${categoryDTO}"
                          method="post">

                        <!-- ID hidden -->
                        <input type="hidden" th:field="*{id}"/>

                        <!-- NAME -->
                        <div class="mb-3">
                            <label class="form-label">Nama Kategori</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   required>
                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mb-3">
                            <label class="form-label">Deskripsi</label>
                            <textarea class="form-control"
                                      th:field="*{description}"
                                      rows="3">
                            </textarea>
                        </div>

                        <!-- UNIT -->
                        <div class="mb-3">
                            <label class="form-label">Unit</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{unit}"
                                   required>
                        </div>

                        <!-- BUTTON -->
                        <div class="d-flex justify-content-between">

                            <a th:href="@{/admin/waste-categories}"
                               class="btn btn-secondary">
                                Batal
                            </a>

                            <button type="submit"
                                    class="btn btn-primary">
                                Update
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
