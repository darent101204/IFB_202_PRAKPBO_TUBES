<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Tambah Kategori Sampah</title>
</head>
<body>

<div layout:fragment="page-title">
    Tambah Kategori Sampah
</div>

<div layout:fragment="content" class="slide-up">

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card">
                <div class="card-body">

                    <form th:action="@{/admin/waste-categories/create}"
                          th:object="${categoryDTO}"
                          method="post">

                        <!-- NAME -->
                        <div class="mb-3">
                            <label class="form-label" for="wastecat-name">Nama Kategori</label>
                            <input id="wastecat-name" type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   placeholder="Masukkan nama kategori (contoh: Plastik, Kertas)"
                                   required>
                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mb-3">
                            <label class="form-label" for="wastecat-description">Deskripsi</label>
                            <textarea id="wastecat-description" class="form-control"
                                      th:field="*{description}"
                                      rows="3"
                                      placeholder="Masukkan deskripsi kategori (opsional)">
                            </textarea>
                        </div>

                        <!-- UNIT -->
                        <div class="mb-3">
                            <label class="form-label" for="wastecat-unit">Unit</label>
                            <input id="wastecat-unit" type="text"
                                   class="form-control"
                                   th:field="*{unit}"
                                   placeholder="Masukkan satuan unit (contoh: kg, pcs)"
                                   required>
                        </div>

                        <!-- BUTTON -->
                        <div class="d-flex justify-content-between">

                            <a th:href="@{/admin/waste-categories}"
                               class="btn btn-secondary">
                                Batal
                            </a>

                            <button type="submit"
                                    class="btn btn-primary">
                                Simpan
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
