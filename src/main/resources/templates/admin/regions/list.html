<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Kelola Region</title>
</head>
<body>
    <div layout:fragment="page-title">Manajemen Wilayah (Region)</div>

    <div layout:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <span>Daftar Wilayah</span>
                <a th:href="@{/admin/regions/create}" class="btn btn-sm btn-primary">Tambah Region</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nama Region</th>
                            <th>Deskripsi</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${regions}">
                            <td th:text="${r.id}"></td>
                            <td th:text="${r.name}"></td>
                            <td th:text="${r.description}"></td>
                            <td>
                                <a th:href="@{/admin/regions/{id}/edit(id=${r.id})}" 
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            
                                <form th:action="@{/admin/regions/{id}/delete(id=${r.id})}"
                                      method="post"
                                      style="display:inline"
                                      onsubmit="return confirm('Hapus region ini?')">
                            
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                            
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
