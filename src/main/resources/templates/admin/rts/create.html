<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Tambah RT</title>
</head>

<body>

<div layout:fragment="page-title">
    Tambah RT
</div>

<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card">
                <div class="card-body">

                    <form th:action="@{/admin/rts/create}"
                          th:object="${rtDTO}"
                          method="post">

                        <!-- NAME -->
                        <div class="mb-3">
                            <label class="form-label">Nama RT</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   placeholder="Contoh: RT 01 / RW 03"
                                   required>
                        </div>

                        <!-- REGION -->
                        <div class="mb-3">
                            <label class="form-label">Region</label>
                            <select class="form-select"
                                    th:field="*{regionId}"
                                    required>
                                <option value="">Pilih Region...</option>
                                <option th:each="r : ${regions}"
                                        th:value="${r.id}"
                                        th:text="${r.name}">
                                </option>
                            </select>
                        </div>

                        <!-- CONTACT PHONE -->
                        <div class="mb-3">
                            <label class="form-label">No. Telepon</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{contactPhone}"
                                   placeholder="08xxxxxxxxxx">
                        </div>

                        <!-- ADDRESS -->
                        <div class="mb-3">
                            <label class="form-label">Alamat</label>
                            <textarea class="form-control"
                                      th:field="*{address}"
                                      rows="3"
                                      placeholder="Alamat RT">
                            </textarea>
                        </div>

                        <!-- BUTTON -->
                        <div class="d-flex justify-content-between">

                            <a th:href="@{/admin/rts}"
                               class="btn btn-secondary">
                                Batal
                            </a>

                            <button type="submit"
                                    class="btn btn-primary">
                                Simpan
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
